{% extends 'base.html' %}
{% load static %}
{% block title %} Add Department{% endblock %}
{% block content %}
<div class="content container-fluid">

    <div class="page-header">
        <div class="row align-items-center">
            <div class="col">
                <h3 class="page-title">Add Department</h3>
                <ul class="breadcrumb">
                    <li class="breadcrumb-item"><a href="{% url 'department_list' %}">Department</a></li>
                    <li class="breadcrumb-item active">Add Department</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-12">
                                <h5 class="form-title"><span>Department Details</span></h5>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Department ID</label>
                                    <input type="text" class="form-control" name="department_id" required>
                                </div>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Department Name</label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Head of Department (HOD)</label>
                                    <select class="form-control" name="hod">
                                        <option value="">Select HOD</option>
                                        {% for teacher in form.fields.hod.queryset %}
                                            <option value="{{ teacher.id }}" {% if form.hod.value == teacher.id %}selected{% endif %}>
                                                {{ teacher.get_name }} - {{ teacher.teacher_id }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label>Description</label>
                                    <textarea class="form-control" name="description" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Department Start Date</label>
                                    <input type="date" class="form-control" name="start_date">
                                </div>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Number of Students</label>
                                    <input type="number" class="form-control" name="number_of_students" min="0">
                                </div>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Number of Teachers</label>
                                    <input type="number" class="form-control" name="number_of_teachers" min="0">
                                </div>
                            </div>

                            <div class="col-12">
                                <h5 class="form-title"><span>Contact Information</span></h5>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Email</label>
                                    <input type="email" class="form-control" name="email">
                                </div>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="form-group">
                                    <label>Phone Number</label>
                                    <input type="text" class="form-control" name="phone_number">
                                </div>
                            </div>
                            <div class="col-12">
                                <div class="form-group">
                                    <label>Office Location</label>
                                    <input type="text" class="form-control" name="office_location">
                                </div>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-primary">Submit</button>
                                <button type="reset" class="btn btn-secondary">Reset</button>
                                <a href="{% url 'department_list' %}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
